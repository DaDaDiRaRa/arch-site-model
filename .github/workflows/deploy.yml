name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 테스트 실행
        run: python -m pytest -q

  deploy:
    name: Deploy to Cloud Run
    needs: test                      # 테스트 통과해야만 배포 (게이트)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: arch-site-model
          region: asia-northeast3
          source: .
          # 환경변수(VWORLD_KEY / ORTHO_SOURCE / NGII_KEY 등)는 서비스에 1회 설정하면
          # 이후 배포가 보존한다(다른 앱과 동일). 콘솔 또는:
          #   gcloud run services update arch-site-model --region asia-northeast3 \
          #     --set-env-vars ORTHO_SOURCE=vworld --set-secrets VWORLD_KEY=vworld-key:latest
